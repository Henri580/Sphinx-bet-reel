<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sphinx V5.0 - Groq</title>
<style>
body{margin:0;background:#0a0a0a;color:#e0e0e0;font-family:Arial}
.header{padding:15px;text-align:center;background:#111;border-bottom:1px solid #333}
.nav{display:flex;background:#111}
.nav button{flex:1;padding:12px;background:none;border:none;color:#888;border-bottom:2px solid transparent;cursor:pointer}
.nav button.active{color:#00ff88;border-bottom:2px solid #00ff88}
.tab{padding:20px;display:none}
.tab.active{display:block}
button{width:100%;padding:15px;background:#00ff88;color:#000;border:none;border-radius:8px;font-weight:bold;cursor:pointer;font-size:16px}
button:disabled{opacity:0.5}
#output{margin-top:20px;padding:15px;background:#111;border-radius:8px;white-space:pre-wrap;line-height:1.6}
</style>
</head>
<body>
<div class="header"><h1>🗿 SPHINX V5.0 GROQ</h1></div>
<div class="nav">
  <button id="tabLive" onclick="showTab('live')">Live</button>
  <button id="tabCoupon" class="active" onclick="showTab('coupon')">Coupon</button>
  <button id="tabChat" onclick="showTab('chat')">Chat</button>
</div>

<div id="live" class="tab"><p>Section Live bientôt...</p></div>

<div id="coupon" class="tab active">
  <button onclick="genererCouponSphinx()">⚡ GÉNÉRER COUPON SPHINX</button>
  <div id="output">Clique pour forger 3 pronos avec Llama3-70B</div>
</div>

<div id="chat" class="tab"><p>Section Chat bientôt...</p></div>

<script>
function showTab(tab){
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('active');
  document.querySelectorAll('.tab').forEach(t=>t.style.display='none');
  document.getElementById(tab).style.display='block';
}

async function genererCouponSphinx(){
  const btn = document.querySelector('#coupon button');
  const out = document.getElementById('output');
  btn.disabled = true;
  out.innerHTML = '⚡ Le Sphinx Groq forge à la vitesse lumière...';
  
  const GROQ_KEY = 'gsk_REMPLACE_PAR_TA_CLE';
  
  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + GROQ_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        model: 'llama3-70b-8192',
        messages: [{
          role: 'user', 
          content: 'Tu es le Sphinx des paris sportifs. Donne 3 matchs de foot réels du 6 mai 2026 avec pronos et cotes. Format: 1. Equipe A vs Equipe B - Prono @ cote. Donne la cote totale à la fin. Réponds direct sans blabla.'
        }],
        temperature: 0.7,
        max_tokens: 400
      })
    });
    
    const data = await res.json();
    if(data.error) throw new Error(data.error.message);
    
    const texte = data.choices[0].message.content;
    out.innerHTML = `✅ SPHINX GROQ FORGE TERMINÉE<br><br>${texte.replace(/\n/g,'<br>')}`;
    
  } catch(e) {
    out.innerHTML = `❌ ERREUR: ${e.message}`;
  }
  btn.disabled = false;
}
</script>
</body>
</html>
